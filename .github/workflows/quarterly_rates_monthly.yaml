name: Monthly Quarterly Rates Update

on:
  schedule:
    # Runs on the 1st of every month at 01:00 UTC (9 AM Singapore Time)
    - cron: "0 1 1 * *"
  workflow_dispatch:

jobs:
  update-quarterly-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quarterly rates scraper
        run: |
          python currency_scraper.py --mode quarterly

      - name: Commit updated quarterly rates
        run: |
          git pull origin main
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add quarterly_rates.json
          git diff-index --quiet HEAD || git commit -m "ci: monthly update of quarterly exchange rates"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
